<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .welcome-card { background: linear-gradient(135deg, #7c3aed, #c026d3); color: white; padding: 2rem; border-radius: 24px; margin-bottom: 2rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: white; padding: 1.5rem; border-radius: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e5e1f5; }
    .stat-number { font-size: 2.5rem; font-weight: 800; color: #ff4d6d; }
    .section-card { background: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e5e1f5; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .property-item { padding: 1rem; border-bottom: 1px solid #e5e1f5; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .badge { padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.7rem; font-weight: bold; }
    .badge-success { background: #dcfce7; color: #16a34a; }
    .badge-pending { background: #fef3c7; color: #d97706; }
    .btn-logout { background: #1e1640; color: white; border: none; padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; }
    .btn-view { background: #f3f0ff; border: none; padding: 0.3rem 0.8rem; border-radius: 8px; cursor: pointer; color: #7c3aed; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="map.html">Map</a>
      <a href="owner.html">For Owners</a>
      <a href="dashboard.html" class="active">Dashboard</a>
    </div>
    <div class="nav-actions">
      <a href="owner.html" class="btn-nav">+ Post Property</a>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="listings.html">Listings</a>
    <a href="map.html">Map</a>
    <a href="owner.html">For Owners</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</nav>

<div class="dashboard-container">
  <div class="welcome-card">
    <h1 id="welcomeName" style="font-family: 'Syne';">Welcome back!</h1>
    <p id="userRole"></p>
    <button class="btn-logout" onclick="logout()" style="margin-top: 1rem;">🚪 Logout</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-number" id="myListingsCount">0</div><div>My Properties</div></div>
    <div class="stat-card"><div class="stat-number" id="totalListingsCount">0</div><div>Total Properties</div></div>
    <div class="stat-card"><div class="stat-number" id="myPaymentsCount">0</div><div>My Payments</div></div>
  </div>

  <div class="section-card" id="myPropertiesSection">
    <div class="section-title">🏠 My Properties</div>
    <div id="myPropertiesList"></div>
  </div>

  <div class="section-card">
    <div class="section-title">❤️ Saved Properties</div>
    <div id="savedPropertiesList"></div>
  </div>
</div>

<script src="script.js"></script>
<script>
  let currentUser = null;
  
  function loadDashboard() {
    currentUser = getCurrentUser();
    if (!currentUser) { window.location.href = 'login.html'; return; }
    
    document.getElementById('welcomeName').innerHTML = `👋 Welcome, ${currentUser.name}!`;
    document.getElementById('userRole').innerHTML = currentUser.role === 'owner' ? '🏢 Property Owner' : '🏠 Renter';
    
    const allListings = getAllListings();
    const myListings = allListings.filter(l => l.ownerId === currentUser.id);
    const myPayments = getUserPayments ? getUserPayments(currentUser.id) : [];
    
    document.getElementById('myListingsCount').innerHTML = myListings.length;
    document.getElementById('totalListingsCount').innerHTML = allListings.length;
    document.getElementById('myPaymentsCount').innerHTML = myPayments.length;
    
    if (myListings.length > 0) {
      document.getElementById('myPropertiesList').innerHTML = myListings.map(l => `
        <div class="property-item">
          <div><strong>${l.emoji} ${l.title}</strong><br/><span style="font-size:0.8rem;">${l.location} | ৳${l.rent.toLocaleString()}/mo</span></div>
          <div><span class="badge ${l.verified ? 'badge-success' : 'badge-pending'}">${l.verified ? '✓ Verified' : '⏳ Pending'}</span>
          <button class="btn-view" onclick="viewProperty(${l.id})">View</button></div>
        </div>
      `).join('');
    } else {
      document.getElementById('myPropertiesList').innerHTML = '<p style="color:#6b7280;">No properties yet. <a href="owner.html">Post your first property →</a></p>';
    }
    
    const saved = getFavorites ? getFavorites(currentUser.id) : [];
    const savedListings = allListings.filter(l => saved.includes(l.id));
    if (savedListings.length > 0) {
      document.getElementById('savedPropertiesList').innerHTML = savedListings.map(l => `
        <div class="property-item">
          <div><strong>${l.emoji} ${l.title}</strong><br/><span style="font-size:0.8rem;">${l.location} | ৳${l.rent.toLocaleString()}/mo</span></div>
          <button class="btn-view" onclick="viewProperty(${l.id})">View Details</button>
        </div>
      `).join('');
    } else {
      document.getElementById('savedPropertiesList').innerHTML = '<p style="color:#6b7280;">No saved properties. Browse <a href="listings.html">listings</a> and save your favorites.</p>';
    }
  }
  
  function viewProperty(id) { window.location.href = `property.html?id=${id}`; }
  function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
  
  window.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
