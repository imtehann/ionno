<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Make Payment — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .payment-container { max-width: 500px; margin: 3rem auto; padding: 2rem; background: white; border-radius: 28px; box-shadow: 0 8px 48px rgba(0,0,0,0.1); }
    .merchant-box { background: #1e1640; color: white; padding: 1rem; border-radius: 16px; text-align: center; margin: 1.5rem 0; }
    .merchant-number { font-size: 2rem; font-weight: 800; letter-spacing: 3px; }
    .method-btn { padding: 1rem; border: 2px solid #e5e1f5; border-radius: 16px; text-align: center; cursor: pointer; margin: 0.5rem 0; transition: all 0.2s; }
    .method-btn.selected { border-color: #ff4d6d; background: rgba(255,77,109,0.1); }
    .transaction-input { width: 100%; padding: 1rem; border: 2px solid #e5e1f5; border-radius: 12px; font-size: 1rem; text-align: center; margin: 1rem 0; }
    .btn-submit { background: linear-gradient(135deg, #ff4d6d, #f43f5e); color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a>
  </div>
</nav>

<div class="payment-container">
  <h1 style="font-family: 'Syne';">💸 Make Payment</h1>
  <p>Pay ৳<span id="amount">99</span> to unlock contact info</p>
  
  <div class="merchant-box">
    <div>Send money to this number:</div>
    <div class="merchant-number">01845162960</div>
    <div>via bKash or Nagad</div>
  </div>
  
  <div id="methodBkash" class="method-btn selected" onclick="selectMethod('bkash')">💳 bKash</div>
  <div id="methodNagad" class="method-btn" onclick="selectMethod('nagad')">📱 Nagad</div>
  
  <input type="text" id="transactionId" class="transaction-input" placeholder="Enter Transaction ID" autocomplete="off">
  <button class="btn-submit" onclick="submitPayment()">✅ Verify Payment</button>
  <div id="message" style="margin-top: 1rem; text-align: center;"></div>
</div>

<script src="script.js"></script>
<script>
  let selectedMethod = 'bkash';
  const urlParams = new URLSearchParams(window.location.search);
  const amount = urlParams.get('amount') || 99;
  const propertyId = urlParams.get('property_id');
  document.getElementById('amount').innerHTML = amount;
  
  function selectMethod(method) {
    selectedMethod = method;
    document.getElementById('methodBkash').classList.remove('selected');
    document.getElementById('methodNagad').classList.remove('selected');
    document.getElementById(`method${method.charAt(0).toUpperCase() + method.slice(1)}`).classList.add('selected');
  }
  
  function submitPayment() {
    const transactionId = document.getElementById('transactionId').value.trim();
    const currentUser = getCurrentUser();
    
    if (!currentUser) { window.location.href = 'login.html'; return; }
    if (!transactionId) { document.getElementById('message').innerHTML = '<span style="color: red;">❌ Enter Transaction ID</span>'; return; }
    
    const payment = {
      id: Date.now(),
      userId: currentUser.id,
      userName: currentUser.name,
      amount: parseInt(amount),
      method: selectedMethod,
      transactionId: transactionId,
      propertyId: propertyId,
      status: 'pending',
      timestamp: new Date().toISOString()
    };
    
    savePayment(payment);
    document.getElementById('message').innerHTML = '<span style="color: green;">✅ Payment submitted! We will verify within 24 hours.</span>';
    setTimeout(() => { window.location.href = propertyId ? `contact.html?id=${propertyId}` : 'dashboard.html'; }, 3000);
  }
</script>
</body>
</html>
