<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Verify — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container { max-width: 1000px; margin: 2rem auto; padding: 1.5rem; }
    .payment-row { background: white; padding: 1rem; border-radius: 12px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .btn-verify { background: #10b981; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; }
    .btn-reject { background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<nav class="navbar"><div class="nav-container"><a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a></div></nav>

<div class="admin-container">
  <h1>🔐 Admin - Verify Payments</h1>
  <p>Check your bKash/Nagad account (01845162960) and verify transactions.</p>
  <div id="paymentsList"></div>
</div>

<script src="script.js"></script>
<script>
  function loadPayments() {
    const payments = getPayments();
    const pending = payments.filter(p => p.status === 'pending');
    document.getElementById('paymentsList').innerHTML = pending.map(p => `
      <div class="payment-row">
        <div><strong>${p.userName}</strong><br/>${p.transactionId}<br/>${p.method} | ৳${p.amount}</div>
        <div>
          <button class="btn-verify" onclick="verifyPayment(${p.id}, 'verified')">✓ Verify</button>
          <button class="btn-reject" onclick="verifyPayment(${p.id}, 'rejected')">✗ Reject</button>
        </div>
      </div>
    `).join('');
    if (pending.length === 0) document.getElementById('paymentsList').innerHTML = '<p>No pending payments.</p>';
  }
  
  function verifyPayment(paymentId, status) {
    let payments = getPayments();
    payments = payments.map(p => p.id === paymentId ? { ...p, status: status } : p);
    localStorage.setItem(PAYMENTS_KEY, JSON.stringify(payments));
    loadPayments();
    alert(`Payment ${status}!`);
  }
  
  window.addEventListener('DOMContentLoaded', loadPayments);
</script>
</body>
</html>
