<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Make Payment — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    .payment-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem; background: linear-gradient(135deg, #f3f0ff, #fff0f3); }
    .payment-card { background: white; border-radius: 28px; padding: 2.5rem; max-width: 550px; width: 100%; box-shadow: 0 8px 48px rgba(124,58,237,0.18); border: 1px solid var(--border); }
    .payment-header { text-align: center; margin-bottom: 2rem; }
    .payment-header h2 { font-family: 'Syne', sans-serif; font-size: 1.8rem; }
    .payment-amount { background: var(--grad-coral); color: white; padding: 1rem; border-radius: 20px; text-align: center; margin-bottom: 2rem; }
    .payment-amount .amount { font-size: 2.5rem; font-weight: 800; }
    .payment-methods { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .method { flex: 1; text-align: center; padding: 1.5rem; border: 2px solid var(--border); border-radius: 20px; cursor: pointer; transition: all 0.25s; }
    .method.selected { border-color: var(--coral); background: rgba(255,77,109,0.1); transform: scale(1.02); }
    .method-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .payment-instructions { background: var(--surface); padding: 1.5rem; border-radius: 16px; margin: 1.5rem 0; }
    .merchant-number { background: var(--ink); color: white; padding: 0.75rem; border-radius: 12px; text-align: center; font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; margin: 1rem 0; }
    .transaction-input { width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; text-align: center; }
    .btn-verify { width: 100%; background: var(--grad-violet); color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
    .message { padding: 0.75rem; border-radius: 10px; margin-top: 1rem; font-size: 0.85rem; }
    .message.success { background: #dcfce7; color: #16a34a; border: 1px solid rgba(34,197,94,0.3); }
    .message.error {
