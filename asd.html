<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Register — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    .auth-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem; background: linear-gradient(135deg, #f3f0ff, #fff0f3); }
    .auth-card { background: white; border-radius: 28px; padding: 2.5rem; max-width: 500px; width: 100%; box-shadow: 0 8px 48px rgba(124,58,237,0.18); border: 1px solid var(--border); }
    .auth-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid var(--border); }
    .auth-tab { padding: 0.75rem 1.5rem; background: none; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; color: var(--muted); transition: all 0.25s; }
    .auth-tab.active { color: var(--coral); border-bottom: 2px solid var(--coral); margin-bottom: -2px; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; }
    .form-group input, .form-group select { width: 100%; padding: 0.85rem; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; }
    .form-group input:focus { outline: none; border-color: var(--violet); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .btn-auth { width: 100%; background: var(--grad-coral); color: white; border: none; padding: 1rem; border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
    .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,77,109,0.45); }
    .role-selector { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .role-option { flex: 1; text-align: center; padding: 0.75rem; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; }
    .role-option.selected { border-color: var(--coral); background: rgba(255,77,109,0.1); }
    .message { padding: 0.75rem; border-radius: 10px; margin-top: 1rem; font-size: 0.85rem; }
    .message.error { background: #ffe4eb; color: var(--coral-dark); border: 1px solid rgba(255,77,109,0.3); }
    .message.success { background: #dcfce7; color: #16a34a; border: 1px solid rgba(34,197,94,0.3); }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="map.html">Map</a>
      <a href="admin.html">Admin</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="auth.html" class="active">Account</a>
    </div>
    <div class="nav-actions">
      <a href="listings.html" class="btn-nav">Browse All</a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="listings.html">Listings</a>
    <a href="map.html">Map</a>
    <a href="admin.html">Admin</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="auth.html">Account</a>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="loginForm" class="auth-form active">
      <form onsubmit="event.preventDefault(); login()">
        <div class="form-group"><label>📧 Email Address</label><input type="email" id="loginEmail" required placeholder="your@email.com"></div>
        <div class="form-group"><label>🔒 Password</label><input type="password" id="loginPassword" required placeholder="••••••••"></div>
        <button type="submit" class="btn-auth">Login →</button>
      </form>
      <div id="loginMessage"></div>
    </div>

    <div id="registerForm" class="auth-form">
      <form onsubmit="event.preventDefault(); register()">
        <div class="form-group"><label>👤 Full Name</label><input type="text" id="regName" required placeholder="Md. Karim Uddin"></div>
        <div class="form-group"><label>📧 Email Address</label><input type="email" id="regEmail" required placeholder="karim@example.com"></div>
        <div class="form-group"><label>📞 Phone Number</label><input type="tel" id="regPhone" required placeholder="018XXXXXXXX"></div>
        <div class="form-group"><label>🔒 Password</label><input type="password" id="regPassword" required placeholder="••••••••"></div>
        <div class="form-group"><label>🔄 Confirm Password</label><input type="password" id="regConfirmPassword" required placeholder="••••••••"></div>
        <div class="form-group"><label>👥 I am a:</label>
          <div class="role-selector">
            <div class="role-option selected" onclick="selectRole('tenant')">🏠 Tenant/Renter</div>
            <div class="role-option" onclick="selectRole('landlord')">🏢 Landlord/Owner</div>
          </div>
        </div>
        <button type="submit" class="btn-auth">Create Account →</button>
      </form>
      <div id="registerMessage"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  let selectedRole = 'tenant';
  function selectRole(role) { selectedRole = role; document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected')); event.currentTarget.classList.add('selected'); }
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    if (tab === 'login') { document.querySelector('.auth-tab:first-child').classList.add('active'); document.getElementById('loginForm').classList.add('active'); }
    else { document.querySelector('.auth-tab:last-child').classList.add('active'); document.getElementById('registerForm').classList.add('active'); }
    document.getElementById('loginMessage').innerHTML = ''; document.getElementById('registerMessage').innerHTML = '';
  }
  function login() {
    const result = userLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
    const msgDiv = document.getElementById('loginMessage');
    if (result.success) { msgDiv.innerHTML = `<div class="message success">✅ ${result.message}</div>`; setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500); }
    else { msgDiv.innerHTML = `<div class="message error">❌ ${result.message}</div>`; }
  }
  function register() {
    if (document.getElementById('regPassword').value !== document.getElementById('regConfirmPassword').value) {
      document.getElementById('registerMessage').innerHTML = '<div class="message error">❌ Passwords do not match!</div>'; return;
    }
    const result = userRegister(document.getElementById('regName').value, document.getElementById('regEmail').value, document.getElementById('regPhone').value, document.getElementById('regPassword').value, selectedRole);
    const msgDiv = document.getElementById('registerMessage');
    if (result.success) { msgDiv.innerHTML = `<div class="message success">✅ ${result.message}</div>`; setTimeout(() => { switchTab('login'); document.getElementById('registerForm').reset(); }, 2000); }
    else { msgDiv.innerHTML = `<div class="message error">❌ ${result.message}</div>`; }
  }
</script>
</body>
</html>
