<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post Your Property — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    .owner-container { max-width: 800px; margin: 0 auto; padding: 3rem 1.5rem; }
    .owner-card { background: white; border-radius: 28px; padding: 2.5rem; box-shadow: 0 8px 48px rgba(0,0,0,0.1); border: 1px solid #e5e1f5; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 0.5rem; color: #1e1640; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.85rem; border: 1.5px solid #e5e1f5; border-radius: 12px; font-family: inherit; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn-submit { background: linear-gradient(135deg, #ff4d6d, #f43f5e); color: white; border: none; padding: 1rem 2rem; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; }
    .message { padding: 1rem; border-radius: 12px; margin-top: 1rem; display: none; }
    .message.success { background: #dcfce7; color: #16a34a; display: block; }
    .message.error { background: #ffe4eb; color: #c9184a; display: block; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="map.html">Map</a>
      <a href="owner.html" class="active">For Owners</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="nav-actions"><a href="login.html" class="btn-nav" id="authBtn">Login</a></div>
  </div>
</nav>

<div class="owner-container">
  <div class="owner-card">
    <h1 style="font-family: 'Syne'; font-size: 2rem; margin-bottom: 0.5rem;">🏢 Post Your Property</h1>
    <p style="color: #6b7280; margin-bottom: 2rem;">List your rental property. Reach thousands of renters directly.</p>
    
    <form id="postPropertyForm" onsubmit="event.preventDefault(); postProperty()">
      <div class="form-group"><label>Property Title *</label><input type="text" id="title" placeholder="e.g., Spacious 3 Bedroom Flat in Mirpur" required></div>
      <div class="form-row">
        <div class="form-group"><label>Area *</label><select id="area" required><option value="">Select Area</option><option>Mirpur</option><option>Uttara</option><option>Dhanmondi</option><option>Gulshan</option><option>Banani</option><option>Bashundhara</option><option>Mohammadpur</option><option>Rampura</option></select></div>
        <div class="form-group"><label>Sub-area/Road</label><input type="text" id="sublocation" placeholder="Section 6, Road 12"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Monthly Rent (BDT) *</label><input type="number" id="rent" placeholder="e.g., 15000" required></div>
        <div class="form-group"><label>Property Type *</label><select id="type" required><option value="">Select</option><option>Family</option><option>Bachelor</option><option>Sublet</option><option>Office</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Bedrooms</label><select id="beds"><option>1</option><option>2</option><option>3</option><option>4</option><option>5+</option></select></div>
        <div class="form-group"><label>Bathrooms</label><select id="baths"><option>1</option><option>2</option><option>3</option></select></div>
      </div>
      <div class="form-group"><label>Description *</label><textarea id="description" rows="4" placeholder="Describe your property - amenities, nearby landmarks, floor, etc." required></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Your Name *</label><input type="text" id="contactName" placeholder="Owner/Landlord name" required></div>
        <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" placeholder="018XXXXXXXX" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Emoji Icon</label><select id="emoji"><option>🏠</option><option>🏢</option><option>🛋️</option><option>🏘️</option><option>🏡</option></select></div>
        <div class="form-group"><label>Premium Listing?</label><select id="premium"><option value="false">Regular (Free)</option><option value="true">Premium (99 TK - Featured)</option></select></div>
      </div>
      <button type="submit" class="btn-submit">✓ Post Property →</button>
      <div id="message" class="message"></div>
    </form>
  </div>
</div>

<script src="script.js"></script>
<script>
  function postProperty() {
    const currentUser = getCurrentUser();
    if (!currentUser) {
      document.getElementById('message').className = 'message error';
      document.getElementById('message').innerHTML = '❌ Please login first as Owner! <a href="login.html" style="color: #c9184a;">Click here to Login</a>';
      return;
    }
    if (currentUser.role !== 'owner' && currentUser.role !== 'landlord') {
      document.getElementById('message').className = 'message error';
      document.getElementById('message').innerHTML = '❌ Only owners/landlords can post properties. Please register as Owner.';
      return;
    }
    
    const area = document.getElementById('area').value;
    const sublocation = document.getElementById('sublocation').value;
    const location = sublocation ? `${area}, ${sublocation}` : area;
    
    const newProperty = {
      id: Date.now(),
      title: document.getElementById('title').value,
      location: location,
      rent: parseInt(document.getElementById('rent').value),
      type: document.getElementById('type').value,
      beds: document.getElementById('beds').value,
      baths: document.getElementById('baths').value,
      description: document.getElementById('description').value,
      contact: document.getElementById('contactName').value,
      phone: document.getElementById('phone').value,
      emoji: document.getElementById('emoji').value,
      premium: document.getElementById('premium').value === 'true',
      verified: false,
      ownerId: currentUser.id,
      ownerName: currentUser.name,
      ownerPhone: currentUser.phone,
      userAdded: true,
      createdAt: new Date().toISOString()
    };
    
    if (!newProperty.title || !newProperty.location || !newProperty.rent || !newProperty.type || !newProperty.description || !newProperty.contact || !newProperty.phone) {
      document.getElementById('message').className = 'message error';
      document.getElementById('message').innerHTML = '❌ Please fill all required fields!';
      return;
    }
    
    addUserListing(newProperty);
    document.getElementById('message').className = 'message success';
    document.getElementById('message').innerHTML = '✅ Property posted successfully! It will appear on map and listings. <a href="listings.html" style="color: #16a34a;">View Listings →</a>';
    document.getElementById('postPropertyForm').reset();
    
    if (newProperty.premium) {
      setTimeout(() => {
        window.location.href = `payment.html?amount=99&property_id=${newProperty.id}&purpose=premium`;
      }, 2000);
    }
  }
  
  window.addEventListener('DOMContentLoaded', () => {
    const user = getCurrentUser();
    if (user && (user.role === 'owner' || user.role === 'landlord')) {
      document.getElementById('contactName').value = user.name;
      document.getElementById('phone').value = user.phone;
    }
  });
</script>
</body>
</html>
