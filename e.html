<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Register — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    .auth-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem; background: linear-gradient(135deg, #f3f0ff, #fff0f3); }
    .auth-card { background: white; border-radius: 28px; padding: 2.5rem; max-width: 500px; width: 100%; box-shadow: 0 8px 48px rgba(0,0,0,0.1); }
    .auth-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #e5e1f5; }
    .auth-tab { padding: 0.75rem 1.5rem; background: none; border: none; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; color: #6b7280; }
    .auth-tab.active { color: #ff4d6d; border-bottom: 2px solid #ff4d6d; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 0.4rem; color: #1e1640; }
    .form-group input, .form-group select { width: 100%; padding: 0.85rem; border: 1.5px solid #e5e1f5; border-radius: 12px; }
    .btn-auth { width: 100%; background: linear-gradient(135deg, #ff4d6d, #f43f5e); color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 1rem; }
    .role-option { padding: 0.75rem; border: 2px solid #e5e1f5; border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 0.5rem; }
    .role-option.selected { border-color: #ff4d6d; background: rgba(255,77,109,0.1); }
    .message { padding: 0.75rem; border-radius: 10px; margin-top: 1rem; font-size: 0.85rem; }
    .message.error { background: #ffe4eb; color: #c9184a; }
    .message.success { background: #dcfce7; color: #16a34a; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="map.html">Map</a>
      <a href="owner.html">For Owners</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="loginForm" class="auth-form active">
      <form onsubmit="event.preventDefault(); login()">
        <div class="form-group"><label>📧 Email</label><input type="email" id="loginEmail" required></div>
        <div class="form-group"><label>🔒 Password</label><input type="password" id="loginPassword" required></div>
        <button type="submit" class="btn-auth">Login →</button>
      </form>
      <div id="loginMessage"></div>
    </div>

    <div id="registerForm" class="auth-form">
      <form onsubmit="event.preventDefault(); register()">
        <div class="form-group"><label>👤 Full Name</label><input type="text" id="regName" required></div>
        <div class="form-group"><label>📧 Email</label><input type="email" id="regEmail" required></div>
        <div class="form-group"><label>📞 Phone</label><input type="tel" id="regPhone" required></div>
        <div class="form-group"><label>🔒 Password</label><input type="password" id="regPassword" required></div>
        <div class="form-group"><label>I am a:</label>
          <div class="role-option" onclick="selectRole('renter')">🏠 Renter (Looking for home)</div>
          <div class="role-option" onclick="selectRole('owner')">🏢 Owner (Have property to rent)</div>
        </div>
        <button type="submit" class="btn-auth">Create Account →</button>
      </form>
      <div id="registerMessage"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  let selectedRole = 'renter';
  function selectRole(role) { selectedRole = role; document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected')); event.currentTarget.classList.add('selected'); }
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    if (tab === 'login') { document.querySelector('.auth-tab:first-child').classList.add('active'); document.getElementById('loginForm').classList.add('active'); }
    else { document.querySelector('.auth-tab:last-child').classList.add('active'); document.getElementById('registerForm').classList.add('active'); }
  }
  function login() {
    const result = userLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
    const msgDiv = document.getElementById('loginMessage');
    if (result.success) { msgDiv.innerHTML = `<div class="message success">✅ ${result.message}</div>`; setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500); }
    else { msgDiv.innerHTML = `<div class="message error">❌ ${result.message}</div>`; }
  }
  function register() {
    if (document.getElementById('regPassword').value.length < 4) {
      document.getElementById('registerMessage').innerHTML = '<div class="message error">❌ Password must be at least 4 characters</div>'; return;
    }
    const result = userRegister(document.getElementById('regName').value, document.getElementById('regEmail').value, document.getElementById('regPhone').value, document.getElementById('regPassword').value, selectedRole);
    if (result.success) { document.getElementById('registerMessage').innerHTML = `<div class="message success">✅ ${result.message}</div>`; setTimeout(() => switchTab('login'), 2000); }
    else { document.getElementById('registerMessage').innerHTML = `<div class="message error">❌ ${result.message}</div>`; }
  }
  document.querySelectorAll('.role-option')[0].classList.add('selected');
</script>
</body>
</html>
