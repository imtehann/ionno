<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Listings — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    .filter-bar { background: white; padding: 1rem 0; border-bottom: 1px solid #e5e1f5; position: sticky; top: 64px; z-index: 10; }
    .filter-container { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .filter-group label { font-size: 0.7rem; font-weight: 700; color: #6b7280; }
    .filter-group select, .filter-group input { padding: 0.5rem 0.75rem; border: 1.5px solid #e5e1f5; border-radius: 10px; }
    .btn-clear { background: #f3f0ff; border: none; padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; font-weight: 600; }
    .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; padding: 2rem 0; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html" class="active">Listings</a>
      <a href="map.html">Map</a>
      <a href="owner.html">For Owners</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </div>
</nav>

<div class="filter-bar">
  <div class="container">
    <div class="filter-container">
      <div class="filter-group"><label>📍 Location</label><select id="filterLocation"><option value="">All</option><option>Mirpur</option><option>Uttara</option><option>Dhanmondi</option><option>Gulshan</option><option>Banani</option><option>Bashundhara</option><option>Mohammadpur</option></select></div>
      <div class="filter-group"><label>💰 Max Rent</label><select id="filterBudget"><option value="">Any</option><option value="10000">10,000 TK</option><option value="20000">20,000 TK</option><option value="30000">30,000 TK</option><option value="50000">50,000 TK</option></select></div>
      <div class="filter-group"><label>🏠 Type</label><select id="filterType"><option value="">All</option><option>Family</option><option>Bachelor</option><option>Sublet</option><option>Office</option></select></div>
      <div class="filter-group"><label>⭐ Status</label><select id="filterVerified"><option value="">All</option><option value="true">Verified Only</option></select></div>
      <button class="btn-clear" onclick="clearFilters()">Clear</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="listings-grid" id="listingsGrid"></div>
  <div id="emptyState" style="display:none; text-align:center; padding:4rem;"><h3>No properties found</h3><p>Try different filters or <a href="owner.html">post your property</a></p></div>
</div>

<script src="script.js"></script>
<script>
  function loadListings() {
    let all = getAllListings();
    const loc = document.getElementById('filterLocation').value;
    const budget = document.getElementById('filterBudget').value;
    const type = document.getElementById('filterType').value;
    const verified = document.getElementById('filterVerified').value;
    
    if (loc) all = all.filter(l => l.location.includes(loc));
    if (budget) all = all.filter(l => l.rent <= parseInt(budget));
    if (type) all = all.filter(l => l.type === type);
    if (verified === 'true') all = all.filter(l => l.verified);
    
    all.sort((a,b) => b.id - a.id);
    
    const grid = document.getElementById('listingsGrid');
    const empty = document.getElementById('emptyState');
    
    if (all.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; }
