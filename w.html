<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property Map — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .full-map-page { height: calc(100vh - 64px); display: flex; }
    #map { flex: 1; }
    .map-sidebar { width: 320px; background: white; padding: 1rem; overflow-y: auto; border-left: 1px solid #e5e1f5; }
    .property-item { padding: 1rem; border-bottom: 1px solid #e5e1f5; cursor: pointer; transition: all 0.2s; border-radius: 12px; margin-bottom: 0.5rem; }
    .property-item:hover { background: #f3f0ff; transform: translateX(-5px); }
    .property-price { color: #ff4d6d; font-weight: bold; }
    @media (max-width: 768px) { .map-sidebar { display: none; } }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="map.html" class="active">Map</a>
      <a href="owner.html">For Owners</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </div>
</nav>

<div class="full-map-page">
  <div id="map"></div>
  <div class="map-sidebar">
    <h3 style="font-family: 'Syne';">📌 All Properties</h3>
    <div id="propertyList"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
<script>
  let map, markers = [];
  const coordinates = {
    'Mirpur': [23.8065, 90.3666], 'Uttara': [23.8759, 90.3795], 'Dhanmondi': [23.7455, 90.3816],
    'Gulshan': [23.7923, 90.4166], 'Banani': [23.7943, 90.4065], 'Bashundhara': [23.8167, 90.4333],
    'Mohammadpur': [23.7653, 90.3654], 'Rampura': [23.7625, 90.4214], 'Other': [23.8103, 90.4125]
  };
  
  function initMap() {
    map = L.map('map').setView([23.8103, 90.4125], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    loadProperties();
  }
  
  function loadProperties() {
    const listings = getAllListings();
    markers.forEach(m => map.removeLayer(m.marker));
    markers = [];
    
    const propertyList = document.getElementById('propertyList');
    propertyList.innerHTML = '';
    
    listings.forEach(property => {
      let area = property.location.split(',')[0];
      let coords = coordinates[area] || coordinates['Other'];
      
      const marker = L.marker(coords).addTo(map);
      marker.bindPopup(`
        <div style="min-width: 220px;">
          <strong>${property.emoji} ${property.title}</strong><br/>
          📍 ${property.location}<br/>
          💰 ৳${property.rent.toLocaleString()}/month<br/>
          🛏 ${property.beds} beds | 🚿 ${property.baths} baths<br/>
          ${property.verified ? '✅ Verified Owner' : '⏳ New Listing'}<br/>
          <a href="contact.html?id=${property.id}" style="color: #ff4d6d; font-weight: bold;">📞 Contact Owner</a>
        </div>
      `);
      
      markers.push({ marker, property, coords });
      
      const div = document.createElement('div');
      div.className = 'property-item';
      div.innerHTML = `<strong>${property.emoji} ${property.title}</strong><br/><span style="font-size: 0.8rem;">${property.location}</span><br/><span class="property-price">৳${property.rent.toLocaleString()}/mo</span>`;
      div.onclick = () => { map.flyTo(coords, 16); marker.openPopup(); };
      propertyList.appendChild(div);
    });
  }
  
  window.addEventListener('DOMContentLoaded', initMap);
</script>
</body>
</html>
