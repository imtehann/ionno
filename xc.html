<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Map View — BashaBari</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    .map-full-page { display: flex; flex-direction: column; height: calc(100vh - 64px); }
    .map-container { flex: 1; position: relative; }
    #fullMap { height: 100%; width: 100%; }
    .map-sidebar {
      position: absolute; top: 20px; right: 20px; width: 320px; background: white;
      border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); z-index: 1000;
      max-height: 80vh; overflow-y: auto; padding: 1rem;
    }
    .map-sidebar h3 { font-family: 'Syne', sans-serif; font-size: 1rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--violet); }
    .map-listing-item { padding: 0.75rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s; border-radius: 8px; }
    .map-listing-item:hover { background: var(--surface); transform: translateX(-4px); }
    .map-listing-item strong { display: block; font-size: 0.85rem; }
    .map-listing-item span { font-size: 0.75rem; color: var(--muted); }
    .map-listing-item .price { color: var(--coral); font-weight: bold; }
    .close-sidebar { float: right; cursor: pointer; background: none; border: none; font-size: 1.2rem; }
    @media (max-width: 768px) { .map-sidebar { width: 280px; right: 10px; top: 10px; max-height: 50vh; } }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">বাসা<span>বাড়ি</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="map.html" class="active">Map</a>
      <a href="admin.html">Admin</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="nav-actions">
      <a href="listings.html" class="btn-nav">Browse All</a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="listings.html">Listings</a>
    <a href="map.html">Map</a>
    <a href="admin.html">Admin</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</nav>

<div class="map-full-page">
  <div class="map-container">
    <div id="fullMap"></div>
    <div class="map-sidebar" id="mapSidebar">
      <button class="close-sidebar" onclick="document.getElementById('mapSidebar').style.display='none'">✕</button>
      <h3>📌 All Listings</h3>
      <div id="mapListingsList"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
<script>
  let map, markers = [];
  const areaCoords = {
    'Mirpur': [23.8065, 90.3666], 'Uttara': [23.8759, 90.3795], 'Dhanmondi': [23.7455, 90.3816],
    'Mohammadpur': [23.7653, 90.3654], 'Gulshan': [23.7923, 90.4166], 'Banani': [23.7943, 90.4065],
    'Bashundhara': [23.8167, 90.4333], 'Rampura': [23.7625, 90.4214], 'Khilgaon': [23.7450, 90.4250],
    'Malibagh': [23.7480, 90.4080], 'Badda': [23.7870, 90.4250], 'Other': [23.8103, 90.4125]
  };

  function initMap() {
    map = L.map('fullMap').setView([23.8103, 90.4125], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors | BashaBari'
    }).addTo(map);
    
    const allListings = getAllListings();
    
    allListings.forEach(listing => {
      let area = listing.location.split(',')[0];
      let coords = areaCoords[area] || areaCoords['Other'];
      const marker = L.marker(coords).addTo(map);
      marker.bindPopup(`
        <div style="min-width: 200px;">
          <strong>${listing.emoji} ${listing.title}</strong><br/>
          📍 ${listing.location}<br/>
          💰 ৳${listing.rent.toLocaleString()}/month<br/>
          🛏 ${listing.beds} beds | 🚿 ${listing.baths} baths<br/>
          ${listing.verified ? '✅ Verified' : '⏳ Pending'}<br/>
          <a href="payment.html?amount=99&listing_id=${listing.id}" style="color: #ff4d6d; text-decoration: none; font-weight: bold;">🔓 Unlock Contact (99 Tk)</a>
        </div>
      `);
      markers.push({ marker, listing, coords });
    });
    
    const sidebarList = document.getElementById('mapListingsList');
    sidebarList.innerHTML = allListings.map(l => {
      let area = l.location.split(',')[0];
      let coords = areaCoords[area] || areaCoords['Other'];
      return `<div class="map-listing-item" onclick="flyToLocation([${coords[0]}, ${coords[1]}])"><strong>${l.emoji} ${l.title}</strong><span>${l.location}</span><div class="price">৳${l.rent.toLocaleString()}/mo</div></div>`;
    }).join('');
  }
  
  function flyToLocation(coords) {
    map.flyTo(coords, 16, { duration: 1.5 });
    setTimeout(() => {
      markers.forEach(m => {
        if (m.coords[0] === coords[0] && m.coords[1] === coords[1]) m.marker.openPopup();
      });
    }, 1500);
  }
  
  window.addEventListener('DOMContentLoaded', initMap);
</script>
</body>
</html>
